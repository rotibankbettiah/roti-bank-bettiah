services:
  - type: web
    name: roti-bank-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        # Update this list to match your actual Vercel and custom domains
        value: https://roti-bank-bettiah.vercel.app,https://www.rotibankbettiah.org,https://rotibankbettiah.org
