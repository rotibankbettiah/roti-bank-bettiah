# ──────────────────────────────────────────────────────────────────────
# Roti Bank Bettiah — Continuous Deployment to GitHub Pages
# Triggers after a push to `main` when CI passes
# ──────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions for GITHUB_TOKEN to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  # ── Build ──────────────────────────────────────────────────────────
  build:
    name: Build for Deployment
    runs-on: ubuntu-latest
    env:
      VITE_RAZORPAY_KEY: ${{ secrets.VITE_RAZORPAY_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests before deploy
        run: npm run test

      - name: Build project
        run: npm run build

      - name: Copy CNAME for custom domain
        run: |
          if [ -f CNAME ]; then
            cp CNAME dist/CNAME
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # ── Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
